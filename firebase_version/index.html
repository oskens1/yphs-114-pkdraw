<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紅白對抗賽 - 投票系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; }
        .work-img { height: 350px; object-fit: contain; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">
    <div id="app" class="w-full max-w-md">
        <header class="text-center mt-4 mb-8">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">紅白對抗賽</h1>
            <div id="status-container" class="mt-2">
                <span id="status-text" class="text-xs font-bold bg-white px-4 py-1 rounded-full text-slate-400 shadow-sm border border-slate-200 inline-block">正在連線至伺服器...</span>
            </div>
        </header>

        <!-- Waiting View -->
        <div id="view-waiting" class="view hidden text-center p-12 bg-white rounded-3xl shadow-xl border border-slate-100 animate-fade-in">
            <div class="relative w-20 h-20 mx-auto mb-6 text-5xl">🎨</div>
            <p class="text-xl font-black text-slate-700">準備中...</p>
            <p class="text-slate-400 mt-2">下一場對決即將展開，請稍候</p>
        </div>

        <!-- Voting View -->
        <div id="view-voting" class="view hidden space-y-6">
            <div class="grid grid-cols-1 gap-6">
                <!-- Red Team Card (Match A) -->
                <div id="card-A" onclick="vote('A')" class="group bg-white p-5 rounded-3xl shadow-lg border-t-8 border-red-500 cursor-pointer active:scale-95 transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-red-600 text-white px-4 py-1 rounded-full text-xs font-black tracking-widest uppercase">紅隊</span>
                        <span id="id-A" class="text-slate-300 font-black text-sm"></span>
                    </div>
                    <div class="bg-slate-50 rounded-2xl overflow-hidden mb-2">
                        <img id="img-A" src="" class="work-img w-full transition-transform group-hover:scale-105">
                    </div>
                </div>

                <div class="flex items-center justify-center">
                    <span class="bg-slate-800 text-white px-6 py-2 rounded-full font-black italic text-xl shadow-lg">VS</span>
                </div>

                <!-- White Team Card (Match B) -->
                <div id="card-B" onclick="vote('B')" class="group bg-white p-5 rounded-3xl shadow-lg border-t-8 border-slate-200 cursor-pointer active:scale-95 transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-slate-100 text-slate-500 px-4 py-1 rounded-full text-xs font-black tracking-widest uppercase border border-slate-200">白隊</span>
                        <span id="id-B" class="text-slate-300 font-black text-sm"></span>
                    </div>
                    <div class="bg-slate-50 rounded-2xl overflow-hidden mb-2">
                        <img id="img-B" src="" class="work-img w-full transition-transform group-hover:scale-105">
                    </div>
                </div>
            </div>
            <p class="text-center text-slate-400 text-sm font-bold mt-4">點擊作品即可投票</p>
        </div>

        <!-- Result View -->
        <div id="view-result" class="view hidden text-center animate-fade-in">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 mb-8">
                <h2 class="text-3xl font-black text-slate-800 mb-6">本回合對決結束</h2>
                <div id="result-detail" class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <!-- JS detail here -->
                </div>
                <div class="mt-8">
                     <div class="text-7xl" id="winner-emoji">🏆</div>
                </div>
            </div>
            <p class="text-slate-400 font-bold italic tracking-widest uppercase text-xs">Waiting for next match...</p>
        </div>
        
        <!-- Voter Team Selection (Modal) -->
        <div id="team-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
            <div class="bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl border border-slate-100">
                <h2 class="text-3xl font-black text-slate-800 mb-2">你是哪一隊的？</h2>
                <p class="text-slate-400 mb-8 font-medium italic">請選擇您的所屬分組</p>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="selectVoterTeam('red')" class="bg-red-600 hover:bg-red-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-red-100 transition-all active:scale-95">紅隊</button>
                    <button onclick="selectVoterTeam('white')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">白隊</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyexSTxp8Y11YQgV15GJgiYXQHZSGvjck",
            authDomain: "pk-draw.firebaseapp.com",
            projectId: "pk-draw",
            storageBucket: "pk-draw.firebasestorage.app",
            messagingSenderId: "890179467084",
            appId: "1:890179467084:web:50359ea62a77458d7541e9",
            measurementId: "G-Q76ZV2BCEP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMatchId = null;
        let voterTeam = localStorage.getItem('voterTeam');
        let hasVoted = false;
        let lastSystemId = null;

        if (voterTeam) {
            document.getElementById('team-modal').classList.add('hidden');
        }

        window.selectVoterTeam = (team) => {
            voterTeam = team;
            localStorage.setItem('voterTeam', team);
            document.getElementById('team-modal').classList.add('hidden');
        };

        // Listen to system state
        onSnapshot(doc(db, "system", "current"), (docSnap) => {
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            
            // Check for system reset
            if (lastSystemId && data.system_id !== lastSystemId) {
                localStorage.clear();
                location.reload();
            }
            lastSystemId = data.system_id;

            updateUI(data);
        });

        function updateUI(data) {
            const views = document.querySelectorAll('.view');
            views.forEach(v => v.classList.add('hidden'));
            
            if (data.status === 'voting') {
                document.getElementById('view-voting').classList.remove('hidden');
                document.getElementById('status-text').innerText = `ROUND ${data.round_number} 進行中`;
                document.getElementById('status-text').className = "text-xs font-black bg-red-600 px-4 py-1 rounded-full text-white shadow-lg shadow-red-100 inline-block tracking-widest";
                
                document.getElementById('img-A').src = data.match_A.image_url;
                document.getElementById('img-B').src = data.match_B.image_url;
                document.getElementById('id-A').innerText = data.match_A.id;
                document.getElementById('id-B').innerText = data.match_B.id;
                
                if (currentMatchId !== data.match_id) {
                    currentMatchId = data.match_id;
                    hasVoted = localStorage.getItem('voted_' + currentMatchId);
                    updateCardSelection();
                }
            } else if (data.status === 'result') {
                document.getElementById('view-result').classList.remove('hidden');
                document.getElementById('status-text').innerText = "回合結束";
                document.getElementById('status-text').className = "text-xs font-black bg-slate-800 px-4 py-1 rounded-full text-white inline-block tracking-widest";
                
                const res = data.last_result;
                const winnerLabel = res.winner === 'A' ? "紅隊" : "白隊";
                const winnerColor = res.winner === 'A' ? "text-red-600" : "text-slate-500";
                
                document.getElementById('result-detail').innerHTML = `
                    <div class="text-3xl font-black text-slate-800 mb-4"><span class="${winnerColor}">${winnerLabel}</span> 獲勝！</div>
                    <div class="flex justify-center gap-4 text-sm font-bold">
                        <span class="text-red-600">紅隊: ${res.votes.A} 票</span>
                        <span class="text-slate-200">|</span>
                        <span class="text-slate-500">白隊: ${res.votes.B} 票</span>
                    </div>
                `;
                document.getElementById('winner-emoji').innerText = res.winner === 'A' ? '🔴' : '⚪';
            } else {
                document.getElementById('view-waiting').classList.remove('hidden');
                document.getElementById('status-text').innerText = "等待對決中";
                document.getElementById('status-text').className = "text-xs font-bold bg-white px-4 py-1 rounded-full text-slate-300 shadow-sm border border-slate-100 inline-block tracking-widest";
            }
        }

        window.vote = async (choice) => {
            if (hasVoted) return;
            if (!currentMatchId) return;

            try {
                await addDoc(collection(db, "votes"), {
                    match_id: currentMatchId,
                    choice: choice,
                    team: voterTeam,
                    timestamp: serverTimestamp()
                });

                hasVoted = true;
                localStorage.setItem('voted_' + currentMatchId, choice);
                updateCardSelection();
            } catch (e) {
                console.error("Vote error:", e);
            }
        };

        function updateCardSelection() {
            const cardA = document.getElementById('card-A');
            const cardB = document.getElementById('card-B');
            const selection = localStorage.getItem('voted_' + currentMatchId);
            
            cardA.classList.remove('ring-8', 'ring-red-500/30');
            cardB.classList.remove('ring-8', 'ring-slate-300/30');
            
            if (selection === 'A') cardA.classList.add('ring-8', 'ring-red-500/30');
            if (selection === 'B') cardB.classList.add('ring-8', 'ring-slate-300/30');
        }
    </script>
</body>
</html>
