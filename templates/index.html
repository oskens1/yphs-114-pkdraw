<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 畫知紅白大對抗 🎨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e9e4d1 !important; /* 圖中的米白色背景 */
            color: #004098; /* 圖中的深藍色 */
            font-family: "Microsoft JhengHei", "Source Han Serif", serif;
        }
        .work-img {
            max-width: 100%;
            height: auto;
            border: 5px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
            background-color: white;
            border-radius: 4px;
        }
        .work-img:hover {
            transform: scale(1.02);
        }
        .card-red {
            background-color: #c00010 !important; /* 圖中的深紅色 */
            color: white;
            border: none;
            border-radius: 0;
        }
        .card-white {
            background-color: #ffffff !important; /* 純白 */
            color: #004098; /* 深藍色文字 */
            border: 1px solid #dee2e6;
            border-radius: 0;
        }
        .voted {
            border-color: #004098 !important; /* 投票後深藍框 */
            box-shadow: 0 0 20px rgba(0, 64, 152, 0.5);
        }
        .match-container {
            display: none;
        }
        .waiting-container {
            text-align: center;
            margin-top: 100px;
        }
        h1 {
            font-weight: 900;
            color: #004098;
            letter-spacing: 4px;
        }
        .btn-vote-red {
            background-color: #ffffff;
            color: #c00010;
            border: 2px solid #ffffff;
            border-radius: 0;
        }
        .btn-vote-red:hover {
            background-color: #c00010;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .btn-vote-white {
            background-color: #004098;
            color: #ffffff;
            border: none;
            border-radius: 0;
        }
        .btn-vote-white:hover {
            background-color: #003380;
        }
        .waiting-container h3 {
            color: #004098;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">🎨 畫知紅白大對抗 🎨</h1>

        <div id="waiting" class="waiting-container">
            <div class="spinner-border text-light mb-3" role="status"></div>
            <h3>目前沒有進行中的 PK</h3>
            <p>請等待老師開啟下一輪對抗...</p>
        </div>

        <div id="match" class="match-container">
            <div class="row">
                <div class="col-md-6 mb-4 text-center">
                    <div class="card shadow-lg card-red h-100">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <h2 class="mb-4">🔴 紅隊</h2>
                            <div>
                                <img id="imgA" src="" class="work-img mb-4 shadow" onclick="vote('A')">
                            </div>
                            <button id="btnA" class="btn btn-vote-red btn-lg w-100 fw-bold py-3 shadow-sm" onclick="vote('A')">投紅隊一票</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-4 text-center">
                    <div class="card shadow-lg card-white h-100">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <h2 class="mb-4">⚪ 白隊</h2>
                            <div>
                                <img id="imgB" src="" class="work-img mb-4 shadow" onclick="vote('B')">
                            </div>
                            <button id="btnB" class="btn btn-vote-white btn-lg w-100 fw-bold py-3 shadow-sm" onclick="vote('B')">投白隊一票</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="vote-status" class="text-center mt-4 h3 text-warning fw-bold" style="display:none; text-shadow: 1px 1px 2px black;">
                ✅ 投票成功！請等待下一輪
            </div>
        </div>
    </div>

    <script>
        let currentMatchId = null;
        let debugMode = false;
        let isVoting = false;
        let statusErrorCount = 0;
        let clientSystemId = localStorage.getItem('system_id');

        function getHasVoted(matchId) {
            return localStorage.getItem('voted_' + matchId) === 'true';
        }

        function setHasVoted(matchId) {
            localStorage.setItem('voted_' + matchId, 'true');
        }

        async function checkStatus() {
            try {
                const response = await fetch('/status');
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                
                statusErrorCount = 0;
                debugMode = data.debug_mode;

                // 檢查系統 ID 是否變動（表示系統已重設）
                if (data.system_id && data.system_id !== clientSystemId) {
                    console.log("System reset detected, clearing local cache...");
                    localStorage.clear();
                    localStorage.setItem('system_id', data.system_id);
                    clientSystemId = data.system_id;
                    currentMatchId = null;
                    location.reload(); 
                    return;
                }

                if (data.current_match && data.current_match.status === 'voting') {
                    const matchId = data.current_match.A.id + '_' + data.current_match.B.id;
                    if (matchId !== currentMatchId) {
                        currentMatchId = matchId;
                        showMatch(data.current_match);
                    } else if (getHasVoted(matchId)) {
                        document.getElementById('vote-status').style.display = 'block';
                        document.getElementById('btnA').disabled = true;
                        document.getElementById('btnB').disabled = true;
                        const votedSide = localStorage.getItem('voted_side_' + matchId);
                        if (votedSide) {
                            document.getElementById('img' + votedSide).classList.add('voted');
                        }
                    }
                } else {
                    if (currentMatchId !== null) {
                        currentMatchId = null;
                        showWaiting();
                    }
                }
            } catch (e) {
                console.error("Error checking status", e);
                statusErrorCount++;
            }
        }

        function showMatch(match) {
            const matchId = match.A.id + '_' + match.B.id;
            const hasVoted = getHasVoted(matchId);

            document.getElementById('waiting').style.display = 'none';
            document.getElementById('match').style.display = 'block';
            document.getElementById('imgA').src = match.A.image_url;
            document.getElementById('imgB').src = match.B.image_url;
            
            document.getElementById('imgA').classList.remove('voted');
            document.getElementById('imgB').classList.remove('voted');
            
            if (hasVoted) {
                document.getElementById('vote-status').innerText = "✅ 投票成功！請等待下一輪";
                document.getElementById('vote-status').style.display = 'block';
                document.getElementById('btnA').disabled = true;
                document.getElementById('btnB').disabled = true;
                const votedSide = localStorage.getItem('voted_side_' + matchId);
                if (votedSide) {
                    document.getElementById('img' + votedSide).classList.add('voted');
                }
            } else {
                document.getElementById('vote-status').style.display = 'none';
                document.getElementById('btnA').disabled = false;
                document.getElementById('btnB').disabled = false;
            }
        }

        function showWaiting() {
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('match').style.display = 'none';
        }

        async function vote(choice) {
            if (!currentMatchId || isVoting) return;
            if (!debugMode && getHasVoted(currentMatchId)) return;

            isVoting = true;
            document.getElementById('btnA').disabled = true;
            document.getElementById('btnB').disabled = true;
            const statusEl = document.getElementById('vote-status');
            statusEl.innerText = "⏳ 正在傳送投票...";
            statusEl.style.display = 'block';

            const formData = new FormData();
            formData.append('choice', choice);

            try {
                const response = await fetch('/vote', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    setHasVoted(currentMatchId);
                    localStorage.setItem('voted_side_' + currentMatchId, choice);
                    statusEl.innerText = "✅ 投票成功！請等待下一輪";
                    if (choice === 'A') {
                        document.getElementById('imgA').classList.add('voted');
                    } else {
                        document.getElementById('imgB').classList.add('voted');
                    }
                } else {
                    throw new Error('Vote failed');
                }
            } catch (e) {
                alert("投票失敗，請檢查網路後再試一次");
                document.getElementById('btnA').disabled = false;
                document.getElementById('btnB').disabled = false;
                statusEl.style.display = 'none';
            } finally {
                isVoting = false;
            }
        }

        setInterval(checkStatus, 2000);
        checkStatus();
    </script>
</body>
</html>
