<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>紅白對抗賽 - 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; overflow: hidden; }
        .arena-img { height: 60vh; max-height: 700px; }
        
        /* Drawer Styles */
        #ranking-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .drawer-open { transform: translateX(0) !important; }
        .drawer-closed { transform: translateX(100%); }
        
        /* Tab Handle */
        .drawer-handle {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="flex flex-col h-screen relative overflow-hidden">
        <!-- Header -->
        <header class="bg-white px-8 py-4 shadow-sm border-b border-slate-200 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-600 rounded-lg flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-red-200">紅</div>
                <div class="text-2xl font-black text-slate-800 tracking-tighter">紅白對抗賽 <span class="text-slate-400 font-normal text-sm ml-2">控制台 v2.5.2</span></div>
            </div>
            <div class="flex items-center gap-6">
                <div id="badge-status" class="px-6 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-400 tracking-widest transition-all uppercase">WAITING</div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <!-- Sidebar: Controls -->
            <aside class="w-72 bg-white border-r border-slate-200 p-6 overflow-y-auto space-y-8 z-10">
                <section>
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">系統管理</h2>
                    <div class="space-y-4">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                            <label class="block text-xs font-bold text-slate-500 mb-2">匯入作品 (PDF)</label>
                            <input type="file" id="pdf-file" accept=".pdf" class="block w-full text-[10px] text-slate-500 mb-3">
                            <button onclick="uploadPDF()" id="btn-upload" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm font-bold shadow-md transition-all">上傳檔案</button>
                        </div>
                        <button onclick="resetSystem()" class="w-full text-red-400 hover:text-red-600 text-xs font-medium transition-colors">⚠️ 重置全系統</button>
                    </div>
                </section>

                <section>
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">回合對戰控制</h2>
                    <div class="space-y-3">
                        <button onclick="startRound()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-6 rounded-2xl font-black text-xl shadow-lg shadow-emerald-100 transition-all active:scale-95">開始新回合</button>
                        <button onclick="endRound()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-amber-100 transition-all active:scale-95">結束並結算</button>
                    </div>
                </section>

                <div class="pt-8 text-center border-t border-slate-50">
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Voting Origin</div>
                        <div id="vote-link-display" class="text-[10px] font-mono text-blue-400 break-all select-all"></div>
                    </div>
                </div>
            </aside>

            <!-- Main Content: Arena -->
            <main class="flex-1 bg-slate-50 overflow-y-auto p-4 flex flex-col relative">
                <div id="live-voting" class="hidden flex-1 flex flex-col">
                    <div class="flex-1 flex items-center justify-around gap-4 px-4">
                        <!-- Red Team -->
                        <div class="flex-1 flex flex-col items-center">
                            <div class="mb-4 flex items-center gap-2">
                                <span class="px-6 py-2 bg-red-600 text-white rounded-full text-xl font-black shadow-lg">紅隊</span>
                                <span id="label-A" class="text-3xl font-black text-slate-700 tracking-tighter"></span>
                            </div>
                            <div class="w-full relative">
                                <img id="img-A" src="" class="arena-img w-full object-contain bg-white rounded-3xl border-4 border-red-500 shadow-2xl p-2">
                                <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-2xl border-8 border-red-50">
                                    <div class="text-5xl font-black text-red-600" id="count-A">0</div>
                                </div>
                            </div>
                        </div>

                        <div class="px-4">
                            <div class="text-7xl font-black text-slate-200 italic tracking-tighter">VS</div>
                        </div>

                        <!-- White Team -->
                        <div class="flex-1 flex flex-col items-center">
                            <div class="mb-4 flex items-center gap-2">
                                <span class="px-6 py-2 bg-slate-300 text-slate-800 rounded-full text-xl font-black shadow-lg">白隊</span>
                                <span id="label-B" class="text-3xl font-black text-slate-700 tracking-tighter"></span>
                            </div>
                            <div class="w-full relative">
                                <img id="img-B" src="" class="arena-img w-full object-contain bg-white rounded-3xl border-4 border-slate-300 shadow-2xl p-2">
                                <div class="absolute -bottom-6 -left-6 w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-2xl border-8 border-slate-100">
                                    <div class="text-5xl font-black text-slate-800" id="count-B">0</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="mt-12 px-20 pb-8">
                        <div class="bg-slate-200 h-10 rounded-full overflow-hidden flex shadow-inner border-4 border-white">
                            <div id="bar-A" class="bg-red-500 transition-all duration-700 ease-out" style="width: 50%"></div>
                            <div id="bar-B" class="bg-slate-400 transition-all duration-700 ease-out" style="width: 50%"></div>
                        </div>
                        <div class="flex justify-between text-2xl font-black text-slate-400 mt-4 px-2 uppercase tracking-widest">
                            <span id="percent-A">50%</span>
                            <span class="text-sm tracking-[0.5em] font-bold">LIVE VOTING</span>
                            <span id="percent-B">50%</span>
                        </div>
                    </div>
                </div>

                <!-- Waiting with QR -->
                <div id="live-waiting" class="flex-1 flex flex-col items-center justify-center text-center p-8 animate-fade-in">
                    <div class="bg-white p-10 rounded-[4rem] shadow-2xl border border-slate-100 mb-10 relative">
                        <div class="text-xs font-black text-slate-300 uppercase tracking-[0.4em] mb-6 leading-none">Scan to enter voting arena</div>
                        <div class="bg-slate-50 p-6 rounded-[2.5rem] inline-block border-2 border-slate-50/50">
                            <img id="qr-code-img" src="" alt="QR Code" class="w-64 h-64 mx-auto">
                        </div>
                        <div id="vote-link-text" class="mt-8 text-blue-600 font-black text-2xl tracking-tighter"></div>
                        <div class="absolute -top-4 -right-4 w-14 h-14 bg-red-500 text-white rounded-full flex items-center justify-center font-black text-sm shadow-xl animate-bounce">GO!</div>
                    </div>
                    <h2 class="text-6xl font-black text-slate-800 tracking-tighter mb-4 italic leading-tight">等待對決開始...</h2>
                    <p class="text-slate-300 text-xl font-bold uppercase tracking-[0.3em]">Next Round Pairing In Progress</p>
                </div>
            </main>

            <!-- Ranking Side Drawer -->
            <div id="ranking-drawer" class="drawer-closed fixed top-0 right-0 h-full w-[450px] bg-white z-40 flex">
                <!-- Tab Handle -->
                <button onclick="toggleDrawer()" class="absolute left-0 top-1/2 -translate-x-full -translate-y-1/2 bg-slate-800 hover:bg-slate-900 text-white px-3 py-10 rounded-l-3xl shadow-2xl flex flex-col items-center gap-4 transition-all">
                    <span class="text-lg">🏆</span>
                    <span class="drawer-handle text-sm font-black tracking-widest uppercase py-2">積分排行榜</span>
                    <span id="drawer-arrow" class="transition-transform duration-300">◀</span>
                </button>

                <!-- Drawer Content -->
                <div class="flex-1 flex flex-col p-8 overflow-hidden bg-white">
                    <div class="flex items-center gap-3 mb-8 pb-4 border-b border-slate-100">
                        <span class="text-3xl">📊</span>
                        <h2 class="text-2xl font-black text-slate-800">ELO 積分排名</h2>
                    </div>
                    <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] text-slate-400 border-b uppercase tracking-widest">
                                    <th class="pb-4 font-bold">Rank</th>
                                    <th class="pb-4 font-bold">ID</th>
                                    <th class="pb-4 font-bold text-right text-blue-600">ELO</th>
                                    <th class="pb-4 font-bold text-right">Win%</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-list" class="text-sm">
                                <!-- JS Content -->
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-auto pt-6 border-t border-slate-50 text-center">
                        <div class="inline-block px-4 py-1 bg-emerald-50 rounded-full text-[10px] font-black text-emerald-600 tracking-widest uppercase">
                             ● Live Syncing
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyexSTxp8Y11YQgV15GJgiYXQHZSGvjck",
            authDomain: "pk-draw.firebaseapp.com",
            projectId: "pk-draw",
            storageBucket: "pk-draw.firebasestorage.app",
            messagingSenderId: "890179467084",
            appId: "1:890179467084:web:50359ea62a77458d7541e9",
            measurementId: "G-Q76ZV2BCEP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMatchId = null;

        // QR Code Logic
        window.addEventListener('DOMContentLoaded', () => {
            const qrImg = document.getElementById('qr-code-img');
            const voteUrl = window.location.origin;
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(voteUrl)}`;
            document.getElementById('vote-link-text').innerText = voteUrl.replace(/^https?:\/\//, '');
            document.getElementById('vote-link-display').innerText = voteUrl;
        });

        // Toggle Drawer
        window.toggleDrawer = () => {
            const drawer = document.getElementById('ranking-drawer');
            const arrow = document.getElementById('drawer-arrow');
            const isOpen = drawer.classList.contains('drawer-open');
            
            if (isOpen) {
                drawer.classList.remove('drawer-open');
                arrow.style.transform = 'rotate(0deg)';
            } else {
                drawer.classList.add('drawer-open');
                arrow.style.transform = 'rotate(180deg)';
            }
        };

        // Listen to system state
        onSnapshot(doc(db, "system", "current"), (docSnap) => {
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            updateUI(data);
        });

        // Listen to ranking
        onSnapshot(query(collection(db, "works"), orderBy("elo", "desc"), limit(50)), (snapshot) => {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            snapshot.docs.forEach((doc, index) => {
                const w = doc.data();
                const winRate = w.match_count > 0 ? Math.round((w.win_count / w.match_count) * 100) : 0;
                list.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                        <td class="py-4"><span class="w-7 h-7 flex items-center justify-center rounded-full ${index < 3 ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-400'} font-black text-xs">${index + 1}</span></td>
                        <td class="py-4 font-bold text-slate-700">${w.id}</td>
                        <td class="py-4 font-mono font-black text-blue-600 text-right">${w.elo}</td>
                        <td class="py-4 text-right text-slate-500 font-bold">${winRate}%</td>
                    </tr>
                `;
            });
        });

        // Listen to live votes
        let unsubscribeVotes = null;
        function listenToVotes(matchId) {
            if (unsubscribeVotes) unsubscribeVotes();
            const q = query(collection(db, "votes"), where("match_id", "==", matchId));
            unsubscribeVotes = onSnapshot(q, (snapshot) => {
                let votesA = 0;
                let votesB = 0;
                snapshot.docs.forEach(doc => {
                    if (doc.data().choice === 'A') votesA++;
                    else votesB++;
                });
                
                document.getElementById('count-A').innerText = votesA;
                document.getElementById('count-B').innerText = votesB;
                
                const total = votesA + votesB;
                const percentA = total > 0 ? Math.round((votesA / total) * 100) : 50;
                const percentB = total > 0 ? Math.round((votesB / total) * 100) : 50;
                
                document.getElementById('bar-A').style.width = percentA + '%';
                document.getElementById('bar-B').style.width = percentB + '%';
                document.getElementById('percent-A').innerText = percentA + '%';
                document.getElementById('percent-B').innerText = percentB + '%';
            });
        }

        function updateUI(data) {
            const badge = document.getElementById('badge-status');
            badge.innerText = data.status.toUpperCase();
            
            if (data.status === 'voting') {
                document.getElementById('live-voting').classList.remove('hidden');
                document.getElementById('live-waiting').classList.add('hidden');
                document.getElementById('label-A').innerText = data.match_A.id;
                document.getElementById('label-B').innerText = data.match_B.id;
                document.getElementById('img-A').src = data.match_A.image_url;
                document.getElementById('img-B').src = data.match_B.image_url;
                badge.className = "px-6 py-2 rounded-full text-sm font-black bg-emerald-500 text-white shadow-lg shadow-emerald-100 tracking-widest uppercase";
                if (currentMatchId !== data.match_id) {
                    currentMatchId = data.match_id;
                    listenToVotes(currentMatchId);
                }
            } else {
                document.getElementById('live-voting').classList.add('hidden');
                document.getElementById('live-waiting').classList.remove('hidden');
                badge.className = "px-6 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-400 shadow-sm tracking-widest uppercase";
            }
        }

        // Admin Functions
        window.resetSystem = async () => {
            if (!confirm("確定要重置整個系統嗎？所有資料將消失！")) return;
            const res = await fetch('/admin/reset', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
        };

        window.uploadPDF = async () => {
            const fileInput = document.getElementById('pdf-file');
            if (fileInput.files.length === 0) return alert("請選擇檔案");
            const btn = document.getElementById('btn-upload');
            btn.disabled = true;
            btn.innerText = "Processing...";
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const res = await fetch('/admin/upload_pdf', { method: 'POST', body: formData });
                const data = await res.json();
                alert(`上傳成功！共匯入 ${data.count} 個作品`);
            } catch (e) {
                alert("上傳失敗");
            } finally {
                btn.disabled = false;
                btn.innerText = "上傳檔案";
            }
        };

        window.startRound = async () => {
            const res = await fetch('/admin/start_round', { method: 'POST' });
            const data = await res.json();
            if (res.status !== 200) alert(data.detail);
        };

        window.endRound = async () => {
            const res = await fetch('/admin/end_round', { method: 'POST' });
            const data = await res.json();
            if (res.status !== 200) alert(data.detail);
        };
    </script>
</body>
</html>
